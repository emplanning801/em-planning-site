  <!-- =========================
       コンセント（同意）前提の計測
       1) まずデフォルトを denied
       2) 同意後に granted へ update
       ※ 設置方法・同意モードは公式手順に沿って実装すること
       ========================= -->
  <script>
    window.__CONSENT__ = (function () {
      try { return JSON.parse(localStorage.getItem("em_consent") || "null"); }
      catch (e) { return null; }
    })();
  </script>

  <!-- Google tag (gtag.js) : 同意モード用（IDは後で差し替え） -->
  <script>
    // TODO: GA4 Measurement ID（例: G-XXXXXXXXXX）に差し替え
    window.__GA_ID__ = "G-XXXXXXXXXX";
  </script>

  <script>
    // 同意モードのデフォルト（denied）
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('consent', 'default', {
      'ad_storage': 'denied',
      'analytics_storage': 'denied',
      'ad_user_data': 'denied',
      'ad_personalization': 'denied'
    });

    // ここで gtag.js を読み込む（同意モード advanced 想定）
    (function(){
      var s = document.createElement('script');
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(window.__GA_ID__);
      document.head.appendChild(s);

      gtag('js', new Date());
      gtag('config', window.__GA_ID__, { 'anonymize_ip': true });
    })();

    // 既に同意済みなら update
    if (window.__CONSENT__ && window.__CONSENT__.analytics === true) {
      gtag('consent', 'update', { 'analytics_storage': 'granted' });
    }
  </script>
