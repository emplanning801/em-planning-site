<script>
function trackAndOpenLine(label, url) {
  try {
    gtag('event', 'line_click', {
      event_category: 'LINE',
      event_label: label,
      transport_type: 'beacon'
    });
    setTimeout(function(){
      window.open(url, '_blank');
    }, 300);
  } catch(e) {
    window.open(url, '_blank');
  }
}
</script>
