<!-- 計測スクリプト -->
<script>
function trackAndOpenLine(label, url) {
  try {
    gtag('event', 'click', {
      event_category: 'LINE',
      event_label: label,
      transport_type: 'beacon'
    });
    setTimeout(function(){
      window.open(url, '_blank');
    }, 300);
  } catch(e) {
    window.open(url, '_blank');
  }
}

function trackPhoneClick(label) {
  gtag('event', 'click', {
    event_category: '電話',
    event_label: label
  });
}

function trackMailClick(label) {
  gtag('event', 'click', {
    event_category: 'メール',
    event_label: label
  });
}
